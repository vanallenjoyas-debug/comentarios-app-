<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comentarios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #f0f0f0; --text2: #888; --text3: #555;
    --accent: #e8d5a3; --accent2: #c4a96a;
    --green: #4ade80; --red: #f87171;
    --radius: 14px; --radius-sm: 8px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; -webkit-font-smoothing: antialiased; }
  #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 32px; }
  .login-logo .brand { font-size: 13px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; text-align: center; }
  .login-logo h1 { font-size: 28px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; text-align: center; }
  .login-box { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }
  .field input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--accent2); }
  .btn-primary { background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-error { font-size: 13px; color: var(--red); text-align: center; display: none; }
  .btn-google { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .yt-status { font-size: 12px; text-align: center; padding: 8px; border-radius: var(--radius-sm); }
  .yt-status.connected { color: var(--green); background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); }
  .yt-status.disconnected { color: var(--text3); background: var(--surface2); border: 1px solid var(--border); }
  #app { display: none; flex-direction: column; min-height: 100vh; }
  .app-header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .app-header h2 { font-size: 17px; font-weight: 600; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge-count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .btn-logout { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .filter-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .filter-chip.active { background: var(--surface2); border-color: var(--accent2); color: var(--accent); }
  .feed { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
  .comment-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .comment-card.answered { border-color: #2a3a2a; opacity: 0.6; }
  .card-top { padding: 14px 14px 10px; display: flex; align-items: flex-start; gap: 10px; }
  .author-photo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .card-meta { flex: 1; min-width: 0; }
  .card-meta-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .username { font-weight: 600; font-size: 14px; }
  .network-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .timestamp { font-size: 11px; color: var(--text3); margin-left: auto; }
  .post-ref { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .comment-text { padding: 0 14px 12px; font-size: 14px; line-height: 1.5; border-bottom: 1px solid var(--border); }
  .comment-likes { padding: 6px 14px; font-size: 12px; color: var(--text3); border-bottom: 1px solid var(--border); }
  .reply-area { padding: 12px 14px; }
  .reply-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.4; resize: none; outline: none; min-height: 70px; -webkit-appearance: none; }
  .reply-input:focus { border-color: var(--accent2); }
  .reply-input::placeholder { color: var(--text3); }
  .reply-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .btn-skip { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 16px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-ai { background: none; border: 1px solid var(--accent2); border-radius: var(--radius-sm); padding: 9px 16px; color: var(--accent2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-send { background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 9px 20px; color: #0f0f0f; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .answered-badge { padding: 10px 14px; font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 6px; }
  .answered-badge::before { content: "✓"; font-weight: 700; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.25s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .stats-bar { padding: 10px 16px; display: flex; gap: 16px; border-top: 1px solid var(--border); background: var(--bg); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .load-more { margin: 8px 16px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; width: calc(100% - 32px); }
  .loading { text-align: center; padding: 40px; color: var(--text3); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-logo">
    <div class="brand">Panel de comentarios</div>
    <h1>Joyería Sudaca</h1>
  </div>
  <div class="login-box">
    <div class="field"><label>Usuario</label><input type="text" id="login-user" placeholder="tu usuario" autocomplete="username" autocapitalize="none"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
    <div class="divider">YouTube</div>
    <div class="yt-status disconnected" id="yt-status">▶️ YouTube no conectado</div>
    <button class="btn-google" onclick="connectYouTube()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><path fill="white" d="M9.5 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
      Conectar YouTube
    </button>
  </div>
</div>
<div id="app">
  <div class="app-header">
    <h2>Comentarios</h2>
    <div class="header-right">
      <span class="badge-count" id="pending-count">cargando...</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="filter-bar">
    <div class="filter-chip active" onclick="setFilter('all',this)">Todos</div>
    <div class="filter-chip" onclick="setFilter('answered',this)">✓ Respondidos</div>
  </div>
  <div class="feed" id="feed"><div class="loading"><div class="spinner"></div><br>Cargando...</div></div>
  <div id="load-more-container"></div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-val" id="stat-pending">0</span><span class="stat-label">Pendientes</span></div>
    <div class="stat"><span class="stat-val" id="stat-answered">0</span><span class="stat-label">Respondidos</span></div>
    <div class="stat"><span class="stat-val" id="stat-total">0</span><span class="stat-label">Total</span></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BACKEND='https://comentarios-backend-production.up.railway.app';
const USERS={"moderador":"sudaca2024","javi":"vanallen2024"};
let currentFilter='all',comments=[],answeredIds=JSON.parse(localStorage.getItem('answeredIds')||'[]'),nextPageToken=null,ytConnected=false,videoTitles={};

async function checkYTStatus(){try{const token=localStorage.getItem('yt_token');if(!token){ytConnected=false;updateYTStatus();return;}const r=await fetch(`${BACKEND}/auth/status`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});const d=await r.json();ytConnected=d.authenticated;updateYTStatus();}catch(e){ytConnected=false;updateYTStatus();}}
function updateYTStatus(){const el=document.getElementById('yt-status');if(ytConnected){el.className='yt-status connected';el.textContent='✓ YouTube conectado';}else{el.className='yt-status disconnected';el.textContent='▶️ YouTube no conectado';}}
async function connectYouTube(){try{const r=await fetch(`${BACKEND}/auth/youtube`,{credentials:'include'});const d=await r.json();window.location.href=d.url;}catch(e){showToast('Error al conectar YouTube');}}
function doLogin(){const u=document.getElementById('login-user').value.trim().toLowerCase();const p=document.getElementById('login-pass').value;if(USERS[u]&&USERS[u]===p){document.getElementById('login-error').style.display='none';document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='flex';loadComments();}else{document.getElementById('login-error').style.display='block';document.getElementById('login-pass').value='';}}
function doLogout(){document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();});
async function loadComments(pageToken=null){if(!ytConnected){document.getElementById('feed').innerHTML='<div class="empty-state"><span class="emoji">▶️</span>Conectá YouTube primero</div>';return;}if(!pageToken){document.getElementById('feed').innerHTML='<div class="loading"><div class="spinner"></div><br>Cargando...</div>';comments=[];}try{const token=localStorage.getItem('yt_token');const r=await fetch(`${BACKEND}/comments${pageToken?'?pageToken='+pageToken:''}`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});if(r.status===401){document.getElementById('feed').innerHTML='<div class="empty-state"><span class="emoji">🔐</span>Sesión expirada. Reconectá YouTube.</div>';return;}const data=await r.json();const nc=data.comments.map(c=>({...c,network:'yt',answered:answeredIds.includes(c.id)}));comments=pageToken?[...comments,...nc]:nc;nextPageToken=data.nextPageToken;loadVideoTitles(nc);renderFeed();updateStats();}catch(e){document.getElementById('feed').innerHTML='<div class="empty-state"><span class="emoji">❌</span>Error al cargar</div>';}}
async function loadVideoTitles(cs){const ids=[...new Set(cs.map(c=>c.videoId).filter(Boolean))];for(const id of ids){if(videoTitles[id])continue;try{const token=localStorage.getItem('yt_token');const r=await fetch(`${BACKEND}/video/${id}`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});const d=await r.json();videoTitles[id]=d.title;}catch(e){}}renderFeed();}
function setFilter(net,el){currentFilter=net;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderFeed();}
function renderFeed(){const feed=document.getElementById('feed');let f=comments.filter(c=>currentFilter==='all'?!c.answered:c.answered);if(f.length===0){feed.innerHTML=`<div class="empty-state"><span class="emoji">${currentFilter==='answered'?'✅':'🎉'}</span>${currentFilter==='answered'?'Nada respondido aún':'Todo al día!'}</div>`;}else{feed.innerHTML=f.map(c=>buildCard(c)).join('');}document.getElementById('load-more-container').innerHTML=nextPageToken?`<button class="load-more" onclick="loadComments('${nextPageToken}')">Cargar más</button>`:'';}
function buildCard(c){const t=formatTime(c.publishedAt);const v=videoTitles[c.videoId]||'YouTube';return `<div class="comment-card ${c.answered?'answered':''}" id="card-${c.id}"><div class="card-top"><img class="author-photo" src="${c.authorPhoto||''}" onerror="this.style.display='none'"><div class="card-meta"><div class="card-meta-top"><span class="username">${esc(c.author)}</span><span class="network-label">YouTube</span><span class="timestamp">${t}</span></div><div class="post-ref">${esc(v)}</div></div></div><div class="comment-text">${esc(c.text)}</div>${c.likeCount>0?`<div class="comment-likes">👍 ${c.likeCount}</div>`:''} ${c.answered?`<div class="answered-badge">Respondido</div>`:`<div class="reply-area"><textarea class="reply-input" id="reply-${c.id}" placeholder="Escribí tu respuesta..." rows="3"></textarea><div class="reply-actions"><button class="btn-skip" onclick="skipComment('${c.id}')">Omitir</button><button class="btn-ai" id="ai-btn-${c.id}" onclick="suggestReply('${c.id}')">✨ Sugerir</button><button class="btn-send" onclick="sendReply('${c.id}')">Publicar →</button></div></div>`}</div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatTime(iso){if(!iso)return '';const diff=Date.now()-new Date(iso).getTime();const m=Math.floor(diff/60000);if(m<60)return `hace ${m}m`;const h=Math.floor(m/60);if(h<24)return `hace ${h}h`;return `hace ${Math.floor(h/24)}d`;}
async function suggestReply(id){const c=comments.find(x=>x.id===id);if(!c)return;const btn=document.getElementById(`ai-btn-${id}`);if(btn){btn.disabled=true;btn.textContent='...';}try{const r=await fetch(`${BACKEND}/suggest-reply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:c.text})});const data=await r.json();if(data.suggestion){const ta=document.getElementById(`reply-${id}`);if(ta)ta.value=data.suggestion;}else{showToast('Sin sugerencia');}}catch(e){showToast('Error al sugerir');}finally{if(btn){btn.disabled=false;btn.textContent='✨ Sugerir';}}}
async function sendReply(id){const ta=document.getElementById(`reply-${id}`);const text=ta?ta.value.trim():'';if(!text){ta.style.borderColor='var(--red)';setTimeout(()=>ta.style.borderColor='',1000);return;}const btn=document.querySelector(`#card-${id} .btn-send`);if(btn){btn.disabled=true;btn.textContent='Publicando...';}try{const token=localStorage.getItem('yt_token');const r=await fetch(`${BACKEND}/comments/${id}/reply`,{method:'POST',headers:{'Content-Type':'application/json',...(token?{'X-YT-Token':token}:{})},credentials:'include',body:JSON.stringify({text})});if(r.ok){const c=comments.find(x=>x.id===id);if(c){c.answered=true;answeredIds.push(id);localStorage.setItem('answeredIds',JSON.stringify(answeredIds));}showToast('✓ Publicado en YouTube');renderFeed();updateStats();}else{showToast('Error al publicar');if(btn){btn.disabled=false;btn.textContent='Publicar →';}}}catch(e){showToast('Error de conexión');if(btn){btn.disabled=false;btn.textContent='Publicar →';}}}
function skipComment(id){const c=comments.find(x=>x.id===id);if(c){comments=comments.filter(x=>x.id!==id);comments.push(c);renderFeed();}}
function updateStats(){const p=comments.filter(c=>!c.answered).length;const a=comments.filter(c=>c.answered).length;document.getElementById('stat-pending').textContent=p;document.getElementById('stat-answered').textContent=a;document.getElementById('stat-total').textContent=comments.length;document.getElementById('pending-count').textContent=`${p} pendiente${p!==1?'s':''}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
checkYTStatus();
const params=new URLSearchParams(window.location.search);
if(params.get('auth')==='success'){const token=params.get('token');if(token){localStorage.setItem('yt_token',token);}ytConnected=true;updateYTStatus();showToast('✓ YouTube conectado!');history.replaceState({},'','/');}
</script>
</body>
</html>
