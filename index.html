<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comentarios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --text: #f0f0f0; --text2: #888; --text3: #555;
    --accent: #e8d5a3; --accent2: #c4a96a;
    --green: #4ade80; --red: #f87171;
    --radius: 14px; --radius-sm: 8px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; -webkit-font-smoothing: antialiased; }
  #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 32px; }
  .login-logo .brand { font-size: 13px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; text-align: center; }
  .login-logo h1 { font-size: 28px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; text-align: center; }
  .login-box { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }
  .field input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--accent2); }
  .btn-primary { background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-error { font-size: 13px; color: var(--red); text-align: center; display: none; }
  .btn-google { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .yt-status { font-size: 12px; text-align: center; padding: 8px; border-radius: var(--radius-sm); }
  .yt-status.connected { color: var(--green); background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); }
  .yt-status.disconnected { color: var(--text3); background: var(--surface2); border: 1px solid var(--border); }
  .login-accounts { display: flex; flex-direction: column; gap: 6px; }
  .login-account-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; font-family: 'DM Mono', monospace; }
  .login-account-row.yt { border-color: #ff000044; color: #ff6666; }
  .login-account-row.fb { border-color: #1877f244; color: #5599ff; }
  .login-account-row .check { color: var(--green); margin-left: auto; }
  .login-account-row .warn { color: var(--red); margin-left: auto; font-size: 11px; }
  #app { display: none; flex-direction: column; min-height: 100vh; }
  .app-header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
  .app-header-top { display: flex; align-items: center; justify-content: space-between; }
  .app-header h2 { font-size: 17px; font-weight: 600; color: var(--accent); }
  .connected-accounts { display: flex; gap: 8px; flex-wrap: wrap; }
  .account-badge { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .account-badge.yt { border-color: #ff0000; color: #ff6666; }
  .account-badge.fb { border-color: #1877f2; color: #5599ff; }
  .account-badge .check { color: var(--green); font-size: 12px; margin-left: 2px; }
  .account-badge .warn { color: var(--red); font-size: 11px; margin-left: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge-count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .btn-logout { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .filter-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .filter-chip.active { background: var(--surface2); border-color: var(--accent2); color: var(--accent); }
  .feed { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
  .comment-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .comment-card.answered { border-color: #2a3a2a; opacity: 0.6; }
  .comment-card.fb { border-left: 3px solid #1877f2; }
  .card-top { padding: 14px 14px 10px; display: flex; align-items: flex-start; gap: 10px; }
  .author-photo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .card-meta { flex: 1; min-width: 0; }
  .card-meta-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .username { font-weight: 600; font-size: 14px; }
  .network-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .network-label.fb { color: #1877f2; }
  .timestamp { font-size: 11px; color: var(--text3); margin-left: auto; }
  .post-ref { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-ref a { color: var(--accent2); text-decoration: none; }
  .post-ref a:hover { text-decoration: underline; }
  .comment-text { padding: 0 14px 12px; font-size: 14px; line-height: 1.5; border-bottom: 1px solid var(--border); }
  .comment-likes { padding: 6px 14px; font-size: 12px; color: var(--text3); border-bottom: 1px solid var(--border); }
  .reply-area { padding: 12px 14px; }
  .reply-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.4; resize: none; outline: none; min-height: 70px; -webkit-appearance: none; transition: border-color 0.2s; }
  .reply-input:focus { border-color: var(--accent2); }
  .reply-input::placeholder { color: var(--text3); }
  .reply-input.loading-suggestion { border-color: var(--accent2); opacity: 0.6; }
  .quick-replies { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 0; }
  .quick-reply { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .quick-reply:hover { border-color: var(--accent2); color: var(--accent); }
  .reply-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .btn-skip { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 16px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-send { background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 9px 20px; color: #0f0f0f; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .answered-badge { padding: 10px 14px; font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 6px; }
  .answered-badge::before { content: "✓"; font-weight: 700; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.25s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .stats-bar { padding: 10px 16px; display: flex; gap: 16px; border-top: 1px solid var(--border); background: var(--bg); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .load-more { margin: 8px 16px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; width: calc(100% - 32px); }
  .loading { text-align: center; padding: 40px; color: var(--text3); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .video-header { padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .video-header a { color: var(--accent2); text-decoration: none; font-size: 13px; }
  .video-header span { font-size: 12px; color: var(--text3); margin-left: 8px; }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-logo">
    <div class="brand">Panel de comentarios</div>
    <h1>Joyería Sudaca</h1>
  </div>
  <div class="login-box">
    <div class="field"><label>Usuario</label><input type="text" id="login-user" placeholder="tu usuario" autocomplete="username" autocapitalize="none"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
    <div class="divider">Cuentas conectadas</div>
    <div class="login-accounts">
      <div class="login-account-row yt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><path fill="white" d="M9.5 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
        <span id="login-yt-handle">cargando...</span>
        <span id="login-yt-check"></span>
      </div>
      <div class="login-account-row fb">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#1877f2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        <span>@javier.vanallen</span>
        <span class="check">✓</span>
      </div>
    </div>
    <div class="yt-status disconnected" id="yt-status">▶️ YouTube no conectado</div>
    <button class="btn-google" onclick="connectYouTube()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><path fill="white" d="M9.5 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
      Conectar YouTube
    </button>
  </div>
</div>
<div id="app">
  <div class="app-header">
    <div class="app-header-top">
      <h2>Comentarios</h2>
      <div class="header-right">
        <span class="badge-count" id="pending-count">cargando...</span>
        <button class="btn-logout" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="connected-accounts" id="connected-accounts"></div>
  </div>
  <div class="filter-bar">
    <div class="filter-chip active" onclick="setFilter('all',this)">Todos</div>
    <div class="filter-chip" onclick="setFilter('yt',this)">▶️ YouTube</div>
    <div class="filter-chip" onclick="setFilter('fb',this)">📘 Facebook</div>
    <div class="filter-chip" onclick="setFilter('answered',this)">✓ Respondidos</div>
    <div class="filter-chip" onclick="setFilter('videos',this)">🎬 Videos viejos</div>
  </div>
  <div class="feed" id="feed"><div class="loading"><div class="spinner"></div><br>Cargando...</div></div>
  <div id="load-more-container"></div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-val" id="stat-pending">0</span><span class="stat-label">Pendientes</span></div>
    <div class="stat"><span class="stat-val" id="stat-answered">0</span><span class="stat-label">Respondidos</span></div>
    <div class="stat"><span class="stat-val" id="stat-total">0</span><span class="stat-label">Total</span></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BACKEND='https://comentarios-backend-production.up.railway.app';
const USERS={"moderador":"sudaca2024","javi":"vanallen2024"};
const CORRECT_YT_HANDLE='@vanallenjoyas';
const QUICK_REPLIES=[
  'puede ser, seria cuestion de ponerlo a prueba 😄',
  'la proxima lo voy a hacer 💪',
  'la verdad es que yo lo hago asi 😄',
  'jajaja que ocurrente 😂',
  'jajaja top comment 😂',
  'no me copio, yo hablo asi 😄',
  'disculpa pero no te entiendo 🤷',
  'HIBRIDOOOO 💪',
  'Exacto 💪',
  'La verdad que si 💪',
  'Meh 🤷',
  'Jajajajaja 😂',
  'Tengo video largo en mi perfil',
  'en tu localidad seguro venden 🔧',
  'aunque no parezca hacer esto es mucho mas rentable de lo que parece 💪',
  'es buena idea, lo tomo para hacer un video en el futuro, gracias 👍',
];

let currentFilter='all';
let comments=[], answeredIds=[], discardedIds=[];
let nextPageToken=null, fbNextCursor=null, ytConnected=false;
let videoTitles={};
let videosList=[], videosPageToken=null, currentVideoIndex=0;
let currentVideoComments=[], currentVideoId='', currentVideoTitle='', currentVideoPageToken=null;
const suggestions={};
const suggestingNow=new Set();
let observer=null;

const YT_ICON=`<svg width="14" height="14" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><path fill="white" d="M9.5 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>`;
const FB_ICON=`<svg width="14" height="14" viewBox="0 0 24 24" fill="#1877f2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`;

function setQuickReply(id,text){const ta=document.getElementById('reply-'+id);if(ta){ta.value=text;ta.dataset.edited='1';ta.focus();}}
function appendEmoji(id,emoji){const ta=document.getElementById('reply-'+id);if(ta){ta.value=(ta.value||'')+emoji;ta.dataset.edited='1';ta.focus();}}

async function checkYTStatus(){
  try{
    const token=localStorage.getItem('yt_token');
    if(!token){ytConnected=false;updateYTStatus();updateAccountDisplays(null,null);return;}
    const r=await fetch(`${BACKEND}/auth/status`,{credentials:'include',headers:{'X-YT-Token':token}});
    const d=await r.json();
    ytConnected=d.authenticated;
    updateYTStatus();
    if(ytConnected)loadChannelInfo();
    else updateAccountDisplays(null,null);
  }catch(e){ytConnected=false;updateYTStatus();updateAccountDisplays(null,null);}
}

async function loadChannelInfo(){
  try{
    const token=localStorage.getItem('yt_token');
    const r=await fetch(`${BACKEND}/auth/channel`,{credentials:'include',headers:{'X-YT-Token':token}});
    const d=await r.json();
    updateAccountDisplays(d.name,d.handle);
  }catch(e){updateAccountDisplays(null,null);}
}

function updateAccountDisplays(ytName,ytHandle){
  const display=ytHandle||ytName||'no conectado';
  const isCorrect=ytHandle&&ytHandle.toLowerCase()===CORRECT_YT_HANDLE.toLowerCase();
  const indicator=ytHandle?(isCorrect?'<span class="check">✓</span>':'<span class="warn">⚠ cuenta incorrecta</span>'):'';
  const loginHandle=document.getElementById('login-yt-handle');
  const loginCheck=document.getElementById('login-yt-check');
  if(loginHandle)loginHandle.textContent=display;
  if(loginCheck)loginCheck.innerHTML=indicator;
  const el=document.getElementById('connected-accounts');
  if(!el)return;
  el.innerHTML=`<span class="account-badge yt">${YT_ICON} ${display}${indicator}</span><span class="account-badge fb">${FB_ICON} @javier.vanallen<span class="check">✓</span></span>`;
}

function updateYTStatus(){const el=document.getElementById('yt-status');if(ytConnected){el.className='yt-status connected';el.textContent='✓ YouTube conectado';}else{el.className='yt-status disconnected';el.textContent='▶️ YouTube no conectado';}}
async function connectYouTube(){try{const r=await fetch(`${BACKEND}/auth/youtube`,{credentials:'include'});const d=await r.json();window.location.href=d.url;}catch(e){showToast('Error al conectar YouTube');}}
function doLogin(){const u=document.getElementById('login-user').value.trim().toLowerCase();const p=document.getElementById('login-pass').value;if(USERS[u]&&USERS[u]===p){localStorage.setItem('loggedIn','1');document.getElementById('login-error').style.display='none';document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='flex';loadAll();}else{document.getElementById('login-error').style.display='block';document.getElementById('login-pass').value='';}}
function doLogout(){localStorage.removeItem('loggedIn');document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();});

async function loadAll(){
  try{const sr=await fetch(`${BACKEND}/state`);const sd=await sr.json();answeredIds=sd.answered||[];discardedIds=sd.discarded||[];}catch(e){}
  comments=[];
  document.getElementById('feed').innerHTML='<div class="loading"><div class="spinner"></div><br>Cargando...</div>';
  await Promise.all([loadYTComments(),loadFBComments()]);
  comments.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  renderFeed();
  updateStats();
}

function showQuotaBanner(){
  const feed=document.getElementById('feed');
  const now=new Date();
  const resetHour=new Date();
  resetHour.setUTCHours(8,0,0,0);
  if(now.getUTCHours()>=8) resetHour.setUTCDate(resetHour.getUTCDate()+1);
  const diffMs=resetHour-now;
  const diffH=Math.floor(diffMs/3600000);
  const diffM=Math.floor((diffMs%3600000)/60000);
  feed.innerHTML=`<div class="empty-state"><span class="emoji">⏳</span><strong>Quota de YouTube agotada</strong><br><br>Se resetea a las 5am Argentina (en aprox. ${diffH}h ${diffM}m).<br><br>Hasta entonces no se pueden cargar ni responder comentarios de YouTube.</div>`;
}

async function loadYTComments(pageToken=null){
  if(!ytConnected)return;
  try{
    const token=localStorage.getItem('yt_token');
    const r=await fetch(`${BACKEND}/comments${pageToken?'?pageToken='+pageToken:''}`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});
    if(r.status===401)return;
    const data=await r.json();
    if(data.error&&data.error.toLowerCase().includes('quota')){showQuotaBanner();return;}
    const nc=data.comments.filter(c=>!discardedIds.includes(c.id)).map(c=>({...c,network:'yt',answered:c.answeredByMe||answeredIds.includes(c.id)}));
    comments=pageToken?[...comments,...nc]:[...comments.filter(c=>c.network!=='yt'),...nc];
    nextPageToken=data.nextPageToken;
    loadVideoTitles(nc);
  }catch(e){console.error('YT load error',e);}
}

async function loadFBComments(){
  try{
    const r=await fetch(`${BACKEND}/fb/make-comments`,{credentials:'include'});
    if(!r.ok)return;
    const data=await r.json();
    const nc=data.comments.filter(c=>!discardedIds.includes(c.id)).map(c=>({...c,answered:answeredIds.includes(c.id)}));
    comments=[...comments.filter(c=>c.network!=='fb'),...nc];
  }catch(e){console.error('FB load error',e);}
}

async function loadVideoTitles(cs){
  const ids=[...new Set(cs.map(c=>c.videoId).filter(Boolean))];
  for(const id of ids){
    if(videoTitles[id])continue;
    try{
      const token=localStorage.getItem('yt_token');
      const r=await fetch(`${BACKEND}/video/${id}`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});
      const d=await r.json();
      videoTitles[id]=d.title;
    }catch(e){}
  }
  if(currentFilter!=='videos')renderFeed();
}

function setFilter(net,el){
  currentFilter=net;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if(net==='videos'){loadVideos();}
  else{renderFeed();}
}

async function fetchSuggestion(id,text){
  if(suggestions[id]||suggestingNow.has(id))return;
  suggestingNow.add(id);
  const ta=document.getElementById('reply-'+id);
  if(ta){ta.placeholder='✨ Generando sugerencia...';ta.classList.add('loading-suggestion');}
  try{
    const r=await fetch(`${BACKEND}/suggest-reply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:text})});
    const data=await r.json();
    if(data.suggestion){
      suggestions[id]=data.suggestion;
      const ta2=document.getElementById('reply-'+id);
      if(ta2&&!ta2.dataset.edited){ta2.value=data.suggestion;ta2.classList.remove('loading-suggestion');ta2.placeholder='Escribí tu respuesta...';}
    }
  }catch(e){
    const ta2=document.getElementById('reply-'+id);
    if(ta2){ta2.classList.remove('loading-suggestion');ta2.placeholder='Escribí tu respuesta...';}
  }finally{suggestingNow.delete(id);}
}

function setupObserver(){
  if(observer)observer.disconnect();
  const pool=currentFilter==='videos'?currentVideoComments:comments;
  observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id=entry.target.dataset.commentId;
        const c=pool.find(x=>x.id===id);
        if(c&&!c.answered)fetchSuggestion(id,c.text);
      }
    });
  },{threshold:0.2});
  document.querySelectorAll('.comment-card[data-comment-id]').forEach(el=>observer.observe(el));
}

function renderFeed(){
  const feed=document.getElementById('feed');
  let f=comments.filter(c=>{
    if(currentFilter==='answered')return c.answered;
    if(currentFilter==='yt')return !c.answered&&c.network==='yt';
    if(currentFilter==='fb')return !c.answered&&c.network==='fb';
    return !c.answered;
  });
  if(f.length===0){feed.innerHTML=`<div class="empty-state"><span class="emoji">${currentFilter==='answered'?'✅':'🎉'}</span>${currentFilter==='answered'?'Nada respondido aún':'Todo al día!'}</div>`;}
  else{feed.innerHTML=f.map(c=>buildCard(c)).join('');}
  let loadMoreHTML='';
  if(nextPageToken&&(currentFilter==='all'||currentFilter==='yt')){loadMoreHTML+=`<button class="load-more" onclick="loadMoreYT()">Cargar más de YouTube</button>`;}
  document.getElementById('load-more-container').innerHTML=loadMoreHTML;
  f.forEach(c=>{if(!c.answered&&suggestions[c.id]){const ta=document.getElementById('reply-'+c.id);if(ta&&!ta.dataset.edited)ta.value=suggestions[c.id];}});
  setupObserver();
}

async function loadMoreYT(){await loadYTComments(nextPageToken);comments.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));renderFeed();updateStats();}

function buildCard(c){
  const t=formatTime(c.publishedAt);
  const isFB=c.network==='fb';
  const networkLabel=isFB?'Facebook':'YouTube';
  let refHTML='';
  if(isFB){
    const msg=c.postMessage?c.postMessage.substring(0,60)+'...':'Facebook';
    refHTML=esc(msg);
  } else {
    const title=videoTitles[c.videoId]||'YouTube';
    const url=c.videoId?`https://www.youtube.com/watch?v=${c.videoId}`:'#';
    refHTML=`<a href="${url}" target="_blank" rel="noopener">${esc(title)}</a>`;
  }
  const emojiBtns=["🔥","😄","🙌","🙏","💪","🤷"].map(e=>`<button class="quick-reply" onclick="appendEmoji('${c.id}','${e}')">${e}</button>`).join('');
  const quickBtns=QUICK_REPLIES.map(r=>`<button class="quick-reply" onclick="setQuickReply('${c.id}','${r.replace(/'/g,"\\'")}')">${r}</button>`).join('');
  return `<div class="comment-card ${c.answered?'answered':''} ${isFB?'fb':''}" id="card-${c.id}" data-comment-id="${c.id}">
    <div class="card-top">
      <img class="author-photo" src="${c.authorPhoto||''}" onerror="this.style.display='none'">
      <div class="card-meta">
        <div class="card-meta-top"><span class="username">${esc(c.author)}</span><span class="network-label ${isFB?'fb':''}">${networkLabel}</span><span class="timestamp">${t}</span></div>
        <div class="post-ref">${refHTML}</div>
      </div>
    </div>
    <div class="comment-text">${esc(c.text)}</div>
    ${c.likeCount>0?`<div class="comment-likes">👍 ${c.likeCount}</div>`:''}
    ${c.answered?`<div class="answered-badge">Respondido</div>`:`
      <div class="reply-area">
        <textarea class="reply-input" id="reply-${c.id}" placeholder="Escribí tu respuesta..." rows="3" oninput="this.dataset.edited='1'"></textarea>
        <div class="quick-replies">${emojiBtns}<button class="btn-send" style="margin-left:auto" onclick="sendReply('${c.id}','${c.network}')">Publicar →</button></div>
        <div class="quick-replies">${quickBtns}</div>
        <div class="reply-actions">
          <button class="btn-skip" onclick="discardComment('${c.id}')">Descartar</button>
          <button class="btn-skip" onclick="skipComment('${c.id}')">Omitir</button>
        </div>
        </div>
      </div>`}
  </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatTime(iso){if(!iso)return '';const diff=Date.now()-new Date(iso).getTime();const m=Math.floor(diff/60000);if(m<60)return `hace ${m}m`;const h=Math.floor(m/60);if(h<24)return `hace ${h}h`;return `hace ${Math.floor(h/24)}d`;}

async function sendReply(id,network){
  const ta=document.getElementById('reply-'+id);
  const text=ta?ta.value.trim():'';
  if(!text){ta.style.borderColor='var(--red)';setTimeout(()=>ta.style.borderColor='',1000);return;}
  const btn=document.querySelector('#card-'+id+' .btn-send');
  if(btn){btn.disabled=true;btn.textContent='Publicando...';}
  try{
    const token=localStorage.getItem('yt_token');
    const endpoint=network==='fb'?`${BACKEND}/fb/comments/${id}/reply`:`${BACKEND}/comments/${id}/reply`;
    const headers={'Content-Type':'application/json'};
    if(network==='yt'&&token)headers['X-YT-Token']=token;
    const c=currentFilter==='videos'?currentVideoComments.find(x=>x.id===id):comments.find(x=>x.id===id);
    const commentText=document.querySelector('#card-'+id+' .comment-text')?.textContent||'';
    const videoTitle=c?.videoId?videoTitles[c.videoId]||'':'';
    const r=await fetch(endpoint,{method:'POST',headers,credentials:'include',body:JSON.stringify({text, commentText, videoTitle})});
    if(r.ok){
      answeredIds.push(id);
      fetch(`${BACKEND}/state/answered`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}).catch(()=>{});
      if(currentFilter==='videos'){
        const c=currentVideoComments.find(x=>x.id===id);
        if(c)c.answered=true;
        showToast('✓ Publicado en YouTube');
        renderVideoFeed(currentVideoId,currentVideoTitle);
      } else {
        const c=comments.find(x=>x.id===id);
        if(c)c.answered=true;
        showToast(`✓ Publicado en ${network==='fb'?'Facebook':'YouTube'}`);
        renderFeed();updateStats();
      }
    }else{
      r.json().then(errData=>{
        const errMsg=(errData.error||'').toLowerCase();
        if(errMsg.includes('quota')){showQuotaBanner();showToast('⏳ Quota de YouTube agotada');}
        else{showToast('Error al publicar');}
        if(btn){btn.disabled=false;btn.textContent='Publicar →';}
      }).catch(()=>{showToast('Error al publicar');if(btn){btn.disabled=false;btn.textContent='Publicar →';}});
    }
  }catch(e){showToast('Error de conexión');if(btn){btn.disabled=false;btn.textContent='Publicar →';}}
}

function discardComment(id){
  delete suggestions[id];
  discardedIds.push(id);
  fetch(`${BACKEND}/state/discarded`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}).catch(()=>{});
  if(currentFilter==='videos'){
    currentVideoComments=currentVideoComments.filter(x=>x.id!==id);
    renderVideoFeed(currentVideoId,currentVideoTitle);
  } else {
    comments=comments.filter(x=>x.id!==id);
    renderFeed();updateStats();
  }
}

function skipComment(id){
  delete suggestions[id];
  suggestingNow.delete(id);
  if(currentFilter==='videos'){
    const c=currentVideoComments.find(x=>x.id===id);
    if(c){
      currentVideoComments=currentVideoComments.filter(x=>x.id!==id);
      currentVideoComments.push(c);
      renderVideoFeed(currentVideoId,currentVideoTitle);
      setTimeout(()=>fetchSuggestion(id,c.text),100);
    }
  } else {
    const c=comments.find(x=>x.id===id);
    if(c){
      comments=comments.filter(x=>x.id!==id);
      comments.push(c);
      renderFeed();
      setTimeout(()=>fetchSuggestion(id,c.text),100);
    }
  }
}

function updateStats(){const p=comments.filter(c=>!c.answered).length;const a=comments.filter(c=>c.answered).length;document.getElementById('stat-pending').textContent=p;document.getElementById('stat-answered').textContent=a;document.getElementById('stat-total').textContent=comments.length;document.getElementById('pending-count').textContent=`${p} pendiente${p!==1?'s':''}`;}

async function loadVideos(){
  const feed=document.getElementById('feed');
  document.getElementById('load-more-container').innerHTML='';
  feed.innerHTML='<div class="loading"><div class="spinner"></div><br>Cargando videos...</div>';
  try{
    const token=localStorage.getItem('yt_token');
    const r=await fetch(`${BACKEND}/channel/videos`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});
    const data=await r.json();
    videosList=data.videos||[];
    videosPageToken=data.nextPageToken;
    currentVideoIndex=0;
    if(videosList.length>0)loadVideoComments(videosList[0].id,videosList[0].title);
    else feed.innerHTML='<div class="empty-state"><span class="emoji">🎬</span>No hay videos</div>';
  }catch(e){
    if(e.message&&e.message.toLowerCase().includes('quota')){showQuotaBanner();}
    else{feed.innerHTML='<div class="empty-state"><span class="emoji">⚠️</span>Error cargando videos</div>';}
  }
}

async function loadVideoComments(videoId,videoTitle,pageToken=null){
  currentVideoId=videoId;
  currentVideoTitle=videoTitle;
  const feed=document.getElementById('feed');
  if(!pageToken){
    currentVideoComments=[];
    feed.innerHTML=`<div class="loading"><div class="spinner"></div><br>Cargando "${esc(videoTitle)}"...</div>`;
  }
  try{
    const token=localStorage.getItem('yt_token');
    const url=`${BACKEND}/video/${videoId}/comments${pageToken?'?pageToken='+pageToken:''}`;
    const r=await fetch(url,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});
    const data=await r.json();
    const newComments=(data.comments||[]).filter(c=>!c.answered&&!discardedIds.includes(c.id));
    currentVideoComments=[...currentVideoComments,...newComments];
    currentVideoPageToken=data.nextPageToken;
    videoTitles[videoId]=videoTitle;
    renderVideoFeed(videoId,videoTitle);
  }catch(e){feed.innerHTML='<div class="empty-state"><span class="emoji">⚠️</span>Error cargando comentarios</div>';}
}

function renderVideoFeed(videoId,videoTitle){
  const feed=document.getElementById('feed');
  const pending=currentVideoComments.filter(c=>!c.answered);
  let html=`<div class="video-header">📹 <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">${esc(videoTitle)}</a><span>${pending.length} pendientes</span></div>`;
  if(pending.length===0){
    html+='<div class="empty-state"><span class="emoji">✅</span>Todo respondido en este video</div>';
  } else {
    html+=pending.map(c=>buildCard(c)).join('');
  }
  feed.innerHTML=html;
  let nav='<div style="display:flex;gap:8px;padding:0 0 12px;">';
  if(currentVideoPageToken)nav+=`<button class="load-more" onclick="loadVideoComments('${videoId}','${videoTitle.replace(/'/g,"\\'")}','${currentVideoPageToken}')">Cargar más comentarios</button>`;
  nav+=`<button class="load-more" onclick="nextVideo()">Siguiente video →</button>`;
  nav+='</div>';
  document.getElementById('load-more-container').innerHTML=nav;
  pending.forEach(c=>{if(suggestions[c.id]){const ta=document.getElementById('reply-'+c.id);if(ta&&!ta.dataset.edited)ta.value=suggestions[c.id];}});
  setupObserver();
}

async function nextVideo(){
  currentVideoIndex++;
  if(currentVideoIndex<videosList.length){
    const v=videosList[currentVideoIndex];
    loadVideoComments(v.id,v.title);
  } else if(videosPageToken){
    const token=localStorage.getItem('yt_token');
    const r=await fetch(`${BACKEND}/channel/videos?pageToken=${videosPageToken}`,{credentials:'include',headers:token?{'X-YT-Token':token}:{}});
    const data=await r.json();
    videosList=[...videosList,...(data.videos||[])];
    videosPageToken=data.nextPageToken;
    const v=videosList[currentVideoIndex];
    if(v)loadVideoComments(v.id,v.title);
  } else {
    document.getElementById('feed').innerHTML='<div class="empty-state"><span class="emoji">🎉</span>Revisaste todos los videos!</div>';
    document.getElementById('load-more-container').innerHTML='';
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

(async()=>{
  const params=new URLSearchParams(window.location.search);
  if(params.get("auth")==="success"){const token=params.get("token");if(token){localStorage.setItem("yt_token",token);}history.replaceState({},"","/");}
  checkYTStatus();
  if(params.get("auth")==="success"){ytConnected=true;updateYTStatus();showToast("✓ YouTube conectado!");}
  if(localStorage.getItem("loggedIn")==="1"){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="flex";
    loadAll();
  }
})();
</script>
